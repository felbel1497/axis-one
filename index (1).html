<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Axis One — Cartes topographiques 3D de vos parcours Strava | Québec</title>
  <meta name="description" content="Axis One transforme vos données GPX Strava en cartes topographiques 3D hexagonales personnalisées. Imprimées au Québec, gravées de vos statistiques. Coureurs, cyclistes, randonneurs."/>
  <meta name="keywords" content="carte topographique 3D, Strava, GPX, parcours, trail, coureur, cadeau sportif, impression 3D, Québec, hexagonal"/>
  <meta name="author" content="Axis One"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://axis-one.ca/"/>

  <!-- Open Graph / Réseaux sociaux -->
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://axis-one.ca/"/>
  <meta property="og:title" content="Axis One — Cartes topographiques 3D de vos parcours Strava"/>
  <meta property="og:description" content="Transformez votre fichier GPX Strava en carte topographique 3D hexagonale. Un souvenir unique, imprimé au Québec."/>
  <meta property="og:locale" content="fr_CA"/>

  <!-- Sitemap -->
  <link rel="sitemap" type="application/xml" href="/sitemap.xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --cream:#f7f5f0;--stone:#e6e2d8;--mist:#c8c3b5;
      --bark:#7a7264;--moss:#4a5e3a;--forest:#2d3d22;--ink:#191915;
    }
    html{scroll-behavior:smooth;}
    body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 56px;height:68px;background:rgba(247,245,240,.0);backdrop-filter:blur(0px);border-bottom:1px solid transparent;transition:background .4s,border-color .4s,backdrop-filter .4s;}
    nav.scrolled{background:rgba(247,245,240,.94);backdrop-filter:blur(16px);border-color:var(--stone);}
    .logo{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;letter-spacing:.22em;text-transform:uppercase;color:#fff;text-decoration:none;transition:color .4s;}
    nav.scrolled .logo{color:var(--ink);}
    .nav-links{display:flex;gap:40px;list-style:none;}
    .nav-links a{font-size:11px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.8);text-decoration:none;transition:color .2s;}
    nav.scrolled .nav-links a{color:var(--bark);}
    .nav-links a:hover{color:#fff;}
    nav.scrolled .nav-links a:hover{color:var(--forest);}
    .nav-cta{border-bottom:1px solid rgba(255,255,255,.5);padding-bottom:1px;}
    nav.scrolled .nav-cta{color:var(--forest)!important;border-color:var(--moss);}

    /* VIDEO HERO */
    .hero-video{position:relative;height:100vh;overflow:hidden;display:flex;align-items:flex-end;}
    .hero-video video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom, rgba(0,0,0,.15) 0%, rgba(0,0,0,.1) 40%, rgba(0,0,0,.65) 100%);}
    .hero-content{position:relative;z-index:2;padding:0 56px 72px;max-width:760px;}
    .eyebrow{font-size:11px;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:20px;display:flex;align-items:center;gap:14px;}
    .eyebrow::before{content:'';width:28px;height:1px;background:rgba(255,255,255,.5);display:block;}
    .hero-content h1{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:300;line-height:1.06;color:#fff;margin-bottom:20px;}
    .hero-content h1 em{font-style:italic;color:rgba(255,255,255,.75);}
    .hero-desc{font-size:16px;font-weight:300;color:rgba(255,255,255,.75);line-height:1.8;max-width:480px;margin-bottom:40px;}
    .hero-actions{display:flex;align-items:center;gap:28px;flex-wrap:wrap;margin-bottom:16px;}
    .btn{display:inline-block;background:#fff;color:var(--forest);padding:13px 32px;font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;transition:background .2s,transform .15s;border:none;cursor:pointer;}
    .btn:hover{background:var(--cream);transform:translateY(-1px);}
    .btn-white-outline{display:inline-block;font-size:11px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.8);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.4);padding-bottom:2px;transition:color .2s,border-color .2s;}
    .btn-white-outline:hover{color:#fff;border-color:rgba(255,255,255,.8);}
    .hero-note{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:.04em;}
    .scroll-hint{position:absolute;bottom:28px;right:56px;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;}
    .scroll-line{width:1px;height:40px;background:rgba(255,255,255,.3);animation:scrollPulse 2s ease-in-out infinite;}
    @keyframes scrollPulse{0%,100%{opacity:.3;transform:scaleY(1)}50%{opacity:.8;transform:scaleY(1.2)}}

    hr{border:none;border-top:1px solid var(--stone);}
    section{padding:96px 56px;}
    .container{max-width:1100px;margin:0 auto;}
    .tag{font-size:11px;font-weight:400;letter-spacing:.18em;text-transform:uppercase;color:var(--moss);margin-bottom:14px;}
    .h2{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;line-height:1.12;margin-bottom:16px;}
    .lead{font-size:15px;font-weight:300;color:var(--bark);max-width:480px;line-height:1.85;}

    .product-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
    .product-img{position:relative;}
    .product-img::after{content:'';position:absolute;top:16px;left:16px;right:-16px;bottom:-16px;border:1px solid var(--stone);z-index:-1;}
    .product-img img{width:100%;display:block;object-fit:cover;filter:saturate(1.05) contrast(1.04);}
    .product-details{display:flex;flex-direction:column;gap:32px;}
    .spec-list{list-style:none;display:flex;flex-direction:column;gap:12px;}
    .spec-list li{font-size:14px;font-weight:300;color:var(--bark);display:flex;align-items:flex-start;gap:12px;line-height:1.6;}
    .spec-list li::before{content:'—';color:var(--mist);flex-shrink:0;}

    .steps-bg{background:var(--forest);}
    .steps-bg .tag{color:var(--moss);}
    .steps-bg .h2{color:var(--cream);}
    .steps-bg .lead{color:rgba(247,245,240,.5);}
    .steps-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:56px;gap:32px;flex-wrap:wrap;}
    .steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.06);}
    .step{background:var(--forest);padding:36px 28px;border-left:1px solid rgba(255,255,255,.05);}
    .step:first-child{border-left:none;}
    .step-num{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;color:rgba(255,255,255,.1);line-height:1;margin-bottom:20px;}
    .step h3{font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--cream);margin-bottom:10px;}
    .step p{font-size:13px;font-weight:300;color:rgba(247,245,240,.5);line-height:1.7;}

    .numbers-bar{background:var(--moss);padding:56px;}
    .numbers-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:32px;text-align:center;}
    .num-val{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:var(--cream);line-height:1;margin-bottom:8px;}
    .num-label{font-size:11px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:rgba(247,245,240,.75);}

    .gallery-grid{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:240px;gap:12px;margin-top:48px;}
    .gi{overflow:hidden;}
    .gi img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s;filter:saturate(1.05) contrast(1.04);}
    .gi:hover img{transform:scale(1.04);}
    .gi-a{grid-column:span 5;grid-row:span 2;}
    .gi-b{grid-column:span 4;}
    .gi-c{grid-column:span 3;}
    .gi-d{grid-column:span 4;}
    .gi-e{grid-column:span 3;grid-row:span 2;}
    .gi-f{grid-column:span 4;}

    .price-card{max-width:520px;margin:48px auto 0;border:1px solid var(--stone);padding:56px;}
    .price-tag{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:300;color:var(--ink);line-height:1;margin-bottom:6px;}
    .price-tag sup{font-family:'Jost',sans-serif;font-size:24px;font-weight:300;color:var(--mist);vertical-align:super;}
    .price-sub{font-size:12px;letter-spacing:.08em;color:var(--mist);margin-bottom:36px;}
    .price-includes{list-style:none;display:flex;flex-direction:column;gap:14px;margin-bottom:40px;padding-bottom:36px;border-bottom:1px solid var(--stone);}
    .price-includes li{font-size:14px;font-weight:300;color:var(--bark);display:flex;align-items:flex-start;gap:12px;}
    .price-includes li::before{content:'—';color:var(--mist);flex-shrink:0;}
    .price-note{font-size:11px;letter-spacing:.06em;color:var(--mist);text-align:center;margin-top:16px;}
    .btn-dark{background:var(--forest);color:var(--cream);display:block;text-align:center;padding:15px;}
    .btn-dark:hover{background:var(--moss);}

    .form-wrap{max-width:620px;margin:52px auto 0;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    .form-group{display:flex;flex-direction:column;gap:8px;}
    .form-group.full{grid-column:1/-1;}
    label{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--bark);}
    input,textarea{font-family:'Jost',sans-serif;font-size:14px;font-weight:300;color:var(--ink);background:transparent;border:none;border-bottom:1px solid var(--stone);padding:10px 0;width:100%;transition:border-color .2s;outline:none;}
    input:focus,textarea:focus{border-color:var(--moss);}
    textarea{resize:vertical;min-height:90px;}
    .file-zone{border:1px dashed var(--stone);padding:28px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
    .file-zone:hover{border-color:var(--moss);background:rgba(74,94,58,.03);}
    .file-zone input[type="file"]{display:none;}
    .file-label{font-size:13px;font-weight:300;color:var(--bark);cursor:pointer;display:block;}
    .file-label strong{color:var(--moss);}
    .file-sub{font-size:11px;color:var(--mist);margin-top:4px;}
    .form-submit{margin-top:36px;}
    .form-submit .btn-dark{font-family:'Jost',sans-serif;font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;border:none;cursor:pointer;width:100%;padding:16px;}
    .form-legal{font-size:11px;color:var(--mist);text-align:center;margin-top:14px;letter-spacing:.04em;}
    .form-success{display:none;text-align:center;padding:56px 24px;border:1px solid var(--stone);}
    .form-success h3{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--forest);margin-bottom:10px;}
    .form-success p{font-size:14px;font-weight:300;color:var(--bark);}

    .faq-list{max-width:660px;margin:52px auto 0;}
    .faq-item{border-top:1px solid var(--stone);padding:20px 0;}
    .faq-item:last-child{border-bottom:1px solid var(--stone);}
    .faq-q{font-size:14px;font-weight:400;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;}
    .faq-icon{width:16px;height:16px;flex-shrink:0;position:relative;}
    .faq-icon::before,.faq-icon::after{content:'';position:absolute;background:var(--mist);transition:transform .2s;}
    .faq-icon::before{width:12px;height:1px;top:7px;left:2px;}
    .faq-icon::after{width:1px;height:12px;top:2px;left:7px;}
    .faq-item.open .faq-icon::after{transform:rotate(90deg);}
    .faq-a{font-size:13px;font-weight:300;color:var(--bark);line-height:1.75;max-height:0;overflow:hidden;transition:max-height .25s ease,margin-top .2s;}
    .faq-item.open .faq-a{max-height:200px;margin-top:12px;}

    .cta-final{background:var(--forest);padding:96px 56px;text-align:center;}
    .cta-final .h2{color:var(--cream);margin-bottom:14px;}
    .cta-final .lead{color:rgba(247,245,240,.5);margin:0 auto 40px;}
    .cta-final .btn{background:var(--cream);color:var(--forest);}
    .cta-final .btn:hover{background:var(--stone);}

    footer{background:var(--ink);padding:48px 56px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
    .footer-logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;letter-spacing:.22em;text-transform:uppercase;color:rgba(247,245,240,.35);}
    footer p{font-size:11px;letter-spacing:.06em;color:rgba(247,245,240,.22);}
    footer a{color:rgba(247,245,240,.32);text-decoration:none;transition:color .2s;}
    footer a:hover{color:var(--cream);}

    @media(max-width:900px){
      .trail-block-header .trail-num{font-size:16px!important;}
      .form-group label{font-size:13px!important;}
      input,textarea,select{font-size:16px!important;}
      .option-check-label strong{font-size:15px!important;}
      .price-line{font-size:14px!important;}
      .hero-content h1{font-size:42px;}
      nav{padding:0 24px;}
      .nav-links{display:none;}
      .hero-content{padding:0 24px 56px;}
      .hero-content h1{font-size:42px;}
      section{padding:64px 24px;}
      .product-grid{grid-template-columns:1fr;gap:48px;}
      .steps-grid{grid-template-columns:1fr 1fr;}
      .numbers-inner{grid-template-columns:repeat(2,1fr);gap:24px;}
      .numbers-bar{padding:40px 24px;}
      .gallery-grid{grid-template-columns:1fr 1fr;grid-auto-rows:200px;}
      .gi-a{grid-column:span 2;grid-row:span 1;}
      .gi-b,.gi-c,.gi-d,.gi-e,.gi-f{grid-column:span 1;grid-row:span 1;}
      .price-card{padding:36px 24px;}
      .form-grid{grid-template-columns:1fr;}
      .cta-final{padding:64px 24px;}
      footer{padding:36px 24px;flex-direction:column;text-align:center;}
    }
  </style>
</head>
